# BuffaloMoneySend API — deploy this repo on Render (Web Service, Node 20)
# Dashboard: New → Blueprint → connect this GitHub repo

services:
  - type: web
    name: buffalomoneysend-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
